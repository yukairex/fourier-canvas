<script type="text/babel">
// Fourier math + path utilities
// DFT: take N complex samples of a path, return N {freq, amp, phase} descriptors

function dft(samples) {
  const N = samples.length;
  const out = [];
  for (let k = 0; k < N; k++) {
    let re = 0, im = 0;
    for (let n = 0; n < N; n++) {
      const phi = (2 * Math.PI * k * n) / N;
      const cos = Math.cos(phi);
      const sin = Math.sin(phi);
      re += samples[n].x * cos + samples[n].y * sin;
      im += -samples[n].x * sin + samples[n].y * cos;
    }
    re /= N;
    im /= N;
    // Remap to signed frequency: k in [N/2, N) becomes k - N (negative freq).
    const freq = k < N / 2 ? k : k - N;
    const amp = Math.sqrt(re * re + im * im);
    const phase = Math.atan2(im, re);
    // center frequencies around 0 (negative + positive) for aesthetic ordering later
    out.push({ re, im, freq, amp, phase });
  }
  // reorder: 0, +1, -1, +2, -2, ... so strongest low-freq dominate
  // Actually sort by amp descending for best visual tracing
  out.sort((a, b) => b.amp - a.amp);
  return out;
}

// Resample a polyline into N evenly-spaced points along its arc length.
function resamplePath(points, N) {
  if (points.length < 2) return points.slice();
  // compute cumulative arc length
  const cum = [0];
  for (let i = 1; i < points.length; i++) {
    const dx = points[i].x - points[i - 1].x;
    const dy = points[i].y - points[i - 1].y;
    cum.push(cum[i - 1] + Math.hypot(dx, dy));
  }
  const total = cum[cum.length - 1];
  if (total === 0) return [points[0]];
  const out = [];
  for (let i = 0; i < N; i++) {
    const t = (i / N) * total;
    // find segment
    let lo = 0, hi = cum.length - 1;
    while (lo < hi - 1) {
      const mid = (lo + hi) >> 1;
      if (cum[mid] <= t) lo = mid;
      else hi = mid;
    }
    const segLen = cum[hi] - cum[lo] || 1;
    const localT = (t - cum[lo]) / segLen;
    out.push({
      x: points[lo].x + (points[hi].x - points[lo].x) * localT,
      y: points[lo].y + (points[hi].y - points[lo].y) * localT,
    });
  }
  return out;
}

// Ensure closed loop (append first point)
function closePath(points) {
  if (points.length < 2) return points;
  const a = points[0];
  const b = points[points.length - 1];
  if (Math.hypot(a.x - b.x, a.y - b.y) > 0.5) {
    return [...points, { x: a.x, y: a.y }];
  }
  return points;
}

// Center path to origin and return {centered, bbox}
function centerPath(points) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const p of points) {
    if (p.x < minX) minX = p.x;
    if (p.y < minY) minY = p.y;
    if (p.x > maxX) maxX = p.x;
    if (p.y > maxY) maxY = p.y;
  }
  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  return {
    centered: points.map((p) => ({ x: p.x - cx, y: p.y - cy })),
    bbox: { minX, minY, maxX, maxY, cx, cy, w: maxX - minX, h: maxY - minY },
  };
}

// Evaluate the Fourier series at time t (0..1) with the top K coefficients.
// Returns array of vector tip positions (the last one is the drawing tip).
function evalFourier(coeffs, t, K, phaseOffset = 0) {
  let x = 0, y = 0;
  const tips = [{ x: 0, y: 0 }];
  const limit = Math.min(K, coeffs.length);
  for (let i = 0; i < limit; i++) {
    const c = coeffs[i];
    const angle = c.freq * 2 * Math.PI * t + c.phase + phaseOffset;
    x += c.amp * Math.cos(angle);
    y += c.amp * Math.sin(angle);
    tips.push({ x, y });
  }
  return tips;
}

Object.assign(window, { dft, resamplePath, closePath, centerPath, evalFourier });

<script type="text/babel">
// Preset closed curves. Each returns an array of {x, y} in a ~600x600 box centered at 0.
// Points are densely sampled along the parametric curve.

function presetHeart(steps = 400) {
  const pts = [];
  for (let i = 0; i < steps; i++) {
    const t = (i / steps) * Math.PI * 2;
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
    pts.push({ x: x * 14, y: y * 14 });
  }
  return pts;
}

function presetStar(steps = 400, points = 5) {
  const pts = [];
  const R = 230, r = 95;
  const verts = [];
  for (let i = 0; i < points * 2; i++) {
    const a = (i / (points * 2)) * Math.PI * 2 - Math.PI / 2;
    const rad = i % 2 === 0 ? R : r;
    verts.push({ x: Math.cos(a) * rad, y: Math.sin(a) * rad });
  }
  // resample along polyline
  const cum = [0];
  for (let i = 1; i <= verts.length; i++) {
    const p0 = verts[(i - 1) % verts.length];
    const p1 = verts[i % verts.length];
    cum.push(cum[cum.length - 1] + Math.hypot(p1.x - p0.x, p1.y - p0.y));
  }
  const total = cum[cum.length - 1];
  for (let i = 0; i < steps; i++) {
    const d = (i / steps) * total;
    let lo = 0;
    while (lo < cum.length - 1 && cum[lo + 1] < d) lo++;
    const segLen = cum[lo + 1] - cum[lo] || 1;
    const t = (d - cum[lo]) / segLen;
    const p0 = verts[lo % verts.length];
    const p1 = verts[(lo + 1) % verts.length];
    pts.push({ x: p0.x + (p1.x - p0.x) * t, y: p0.y + (p1.y - p0.y) * t });
  }
  return pts;
}

function presetInfinity(steps = 400) {
  const pts = [];
  const a = 240;
  for (let i = 0; i < steps; i++) {
    const t = (i / steps) * Math.PI * 2;
    const denom = 1 + Math.sin(t) * Math.sin(t);
    pts.push({ x: (a * Math.cos(t)) / denom, y: (a * Math.sin(t) * Math.cos(t)) / denom });
  }
  return pts;
}

function presetFlower(steps = 500, petals = 6) {
  const pts = [];
  for (let i = 0; i < steps; i++) {
    const t = (i / steps) * Math.PI * 2;
    const r = 180 + 70 * Math.cos(petals * t);
    pts.push({ x: r * Math.cos(t), y: r * Math.sin(t) });
  }
  return pts;
}

function presetSquare(steps = 400) {
  const size = 220;
  const corners = [
    { x: -size, y: -size },
    { x: size, y: -size },
    { x: size, y: size },
    { x: -size, y: size },
  ];
  const pts = [];
  for (let c = 0; c < 4; c++) {
    const p0 = corners[c];
    const p1 = corners[(c + 1) % 4];
    const per = steps / 4;
    for (let i = 0; i < per; i++) {
      const t = i / per;
      pts.push({ x: p0.x + (p1.x - p0.x) * t, y: p0.y + (p1.y - p0.y) * t });
    }
  }
  return pts;
}

// A stylized treble-like spiral squiggle
function presetSpiral(steps = 500) {
  const pts = [];
  for (let i = 0; i < steps; i++) {
    const t = (i / steps) * Math.PI * 2;
    const r = 180 * (1 + 0.4 * Math.sin(3 * t));
    const a = t + 0.8 * Math.sin(2 * t);
    pts.push({ x: r * Math.cos(a), y: r * Math.sin(a) });
  }
  return pts;
}

// 3:2 Lissajous figure with π/4 phase offset
function presetLissajous(steps = 600) {
  const pts = [];
  for (let i = 0; i < steps; i++) {
    const t = (i / steps) * Math.PI * 2;
    pts.push({ x: 210 * Math.sin(3 * t + Math.PI / 4), y: 210 * Math.sin(2 * t) });
  }
  return pts;
}

// 5-cusp epicycloid: rolling circle R=160, r=40
function presetEpicycloid(steps = 600) {
  const pts = [];
  for (let i = 0; i < steps; i++) {
    const t = (i / steps) * Math.PI * 2;
    pts.push({
      x: 200 * Math.cos(t) - 40 * Math.cos(5 * t),
      y: 200 * Math.sin(t) - 40 * Math.sin(5 * t),
    });
  }
  return pts;
}

// 3-cusped hypocycloid (deltoid)
function presetDeltoid(steps = 600) {
  const pts = [];
  for (let i = 0; i < steps; i++) {
    const t = (i / steps) * Math.PI * 2;
    pts.push({
      x: 160 * Math.cos(t) + 80 * Math.cos(2 * t),
      y: 160 * Math.sin(t) - 80 * Math.sin(2 * t),
    });
  }
  return pts;
}

const PRESETS = {
  heart:      { label: 'Heart',      fn: presetHeart },
  star:       { label: 'Star',       fn: presetStar },
  infinity:   { label: 'Lemniscate', fn: presetInfinity },
  flower:     { label: 'Rosette',    fn: presetFlower },
  square:     { label: 'Square',     fn: presetSquare },
  spiral:     { label: 'Spiral',     fn: presetSpiral },
  lissajous:  { label: 'Lissajous',  fn: presetLissajous },
  epicycloid: { label: 'Epicycloid', fn: presetEpicycloid },
  deltoid:    { label: 'Deltoid',    fn: presetDeltoid },
};

window.PRESETS = PRESETS;

<script type="text/babel">
// Vector Studio: directly edit a small set of (freq, amp, phase) vectors.

const { useState: useStudioState } = React;

function genDefaultVectors() {
  // A pleasing starter: two counter-rotating vectors → ellipse-ish
  return [
    { id: 1, freq:  1, amp: 160, phase: 0 },
    { id: 2, freq: -3, amp:  60, phase: 1.0 },
    { id: 3, freq:  5, amp:  24, phase: 0.4 },
  ];
}

// Render the studio panel (fills the left rail area when in studio mode).
function VectorStudio({ vectors, setVectors, theme, tr }) {
  const nextId = React.useRef(
    vectors.reduce((m, v) => Math.max(m, v.id), 0) + 1
  );

  const update = (id, key, val) => {
    setVectors((vs) => vs.map((v) => v.id === id ? { ...v, [key]: val } : v));
  };
  const remove = (id) => {
    setVectors((vs) => vs.filter((v) => v.id !== id));
  };
  const add = () => {
    const id = nextId.current++;
    setVectors((vs) => [...vs, { id, freq: vs.length + 1, amp: 40, phase: 0 }]);
  };
  const reset = () => {
    const starters = genDefaultVectors();
    nextId.current = starters.length + 1;
    setVectors(starters);
  };
  const randomize = () => {
    setVectors((vs) => vs.map((v) => ({
      ...v,
      freq: Math.round((Math.random() * 2 - 1) * 8) || 1,
      amp: 20 + Math.random() * 180,
      phase: Math.random() * Math.PI * 2,
    })));
  };

  return (
    <section style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <SectionLabel theme={theme}>{tr ? tr.vectorsLabel(vectors.length) : `Vectors · ${vectors.length}`}</SectionLabel>
        <div style={{ display: 'flex', gap: 6 }}>
          <Button small theme={theme} onClick={randomize}>{tr ? tr.randomize : 'Randomize'}</Button>
          <Button small theme={theme} onClick={reset}>{tr ? tr.reset : 'Reset'}</Button>
        </div>
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {vectors.map((v, i) => (
          <VectorCard key={v.id} v={v} i={i} theme={theme} tr={tr} onChange={update} onRemove={remove} canRemove={vectors.length > 1} />
        ))}
      </div>

      <button
        onClick={add}
        style={{
          padding: '10px', background: 'transparent',
          border: `1px dashed ${theme.line}`,
          borderRadius: 6, color: theme.muted,
          fontSize: 11, fontFamily: 'JetBrains Mono, monospace',
          letterSpacing: 2, textTransform: 'uppercase',
          cursor: 'pointer',
        }}
      >{ tr ? tr.addVector : '+ Add vector' }</button>
    </section>
  );
}

function VectorCard({ v, i, theme, tr, onChange, onRemove, canRemove }) {
  // Little swatch color cycling through accents for identity
  const hue = (i * 47) % 360;
  return (
    <div style={{
      border: `1px solid ${theme.line}`,
      borderRadius: 8,
      padding: '10px 12px',
      background: theme.bg === theme.panel ? 'transparent' : theme.bg,
    }}>
      <div style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        marginBottom: 8,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{
            width: 10, height: 10, borderRadius: 99,
            background: `hsl(${hue} 65% 52%)`,
            display: 'inline-block',
          }} />
          <span style={{
            fontFamily: 'JetBrains Mono, monospace',
            fontSize: 11, color: theme.ink, fontWeight: 500,
          }}>
            v{String(i + 1).padStart(2, '0')}
          </span>
          <span style={{
            fontFamily: 'JetBrains Mono, monospace',
            fontSize: 10, color: theme.muted,
          }}>
            {v.amp.toFixed(0)} · e^(i·{v.freq}·2πt{v.phase >= 0 ? '+' : ''}{v.phase.toFixed(2)})
          </span>
        </div>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        <MiniSlider label={tr ? tr.freq  : 'freq'}  value={v.freq}  min={-10} max={10}     step={1}    theme={theme}
          onChange={(x) => onChange(v.id, 'freq', x)}  format={(x) => `${x > 0 ? '+' : ''}${x}`} />
        <MiniSlider label={tr ? tr.amp   : 'amp'}   value={v.amp}   min={0}   max={260}    step={1}    theme={theme}
          onChange={(x) => onChange(v.id, 'amp', x)}   format={(x) => `${x.toFixed(0)}`} />
        <MiniSlider label={tr ? tr.phase : 'phase'} value={v.phase} min={0}   max={6.2832} step={0.01} theme={theme}
          onChange={(x) => onChange(v.id, 'phase', x)} format={(x) => `${(x / Math.PI).toFixed(2)}π`} />
      </div>
      {canRemove && (
        <button
          onClick={() => onRemove(v.id)}
          style={{
            marginTop: 4, padding: '4px 8px', fontSize: 10,
            background: 'transparent', color: theme.muted,
            border: `1px solid ${theme.line}`, borderRadius: 4,
            cursor: 'pointer', fontFamily: 'Inter, sans-serif',
          }}
        >{tr ? tr.removeVector : 'Remove vector'}</button>
      )}
    </div>
  );
}

function MiniSlider({ label, value, min, max, step, onChange, format, theme }) {
  return (
    <div style={{ display: 'grid', gridTemplateColumns: '36px 1fr 48px', alignItems: 'center', gap: 8 }}>
      <span style={{
        fontFamily: 'JetBrains Mono, monospace', fontSize: 10,
        color: theme.muted, letterSpacing: 1, textTransform: 'uppercase',
      }}>{label}</span>
      <input type="range" min={min} max={max} step={step} value={value}
        onChange={(e) => onChange(parseFloat(e.target.value))}
        style={{ width: '100%', accentColor: theme.accent, height: 3 }} />
      <span style={{
        fontFamily: 'JetBrains Mono, monospace', fontSize: 10.5, color: theme.ink,
        textAlign: 'right',
      }}>{format ? format(value) : value}</span>
    </div>
  );
}

// Build a synthetic coeffs array from studio vectors for FourierCanvas to consume.
function vectorsToCoeffs(vectors) {
  // Sort by amp descending so largest-first (matches drawn-path behavior).
  const sorted = [...vectors].filter((v) => v.amp > 0).sort((a, b) => b.amp - a.amp);
  return sorted.map((v) => ({
    freq: v.freq,
    amp: v.amp,
    phase: v.phase,
    re: v.amp * Math.cos(v.phase),
    im: v.amp * Math.sin(v.phase),
  }));
}

Object.assign(window, { VectorStudio, genDefaultVectors, vectorsToCoeffs });

<script type="text/babel">
// FourierCanvas: drawing + animation + zoom/pan.

function FourierCanvas({
  theme, coeffs, userPath,
  N, speed, playing, showCircles, showVectors, showUserPath, trailMode,
  onDrawStart, onDrawPoint, onDrawEnd, canDraw,
  onTimeUpdate,
  traceColor, traceWidth, phaseOffset,
  seekRef, canvasRefOut, isRecording,
}) {
  const canvasRef = React.useRef(null);
  const overlayRef = React.useRef(null);
  const containerRef = React.useRef(null);
  const [dims, setDims] = React.useState({ w: 800, h: 600 });

  // Zoom/pan state (refs for perf in animation loop)
  const viewRef = React.useRef({ scale: 1, ox: 0, oy: 0 }); // ox,oy = pan offset in canvas px
  const [viewState, setViewState] = React.useState({ scale: 1, ox: 0, oy: 0 }); // for overlay re-draw
  const panRef = React.useRef(null); // { startX, startY, startOx, startOy }

  const tRef = React.useRef(0);
  const tracePtsRef = React.useRef([]);
  const rafRef = React.useRef(0);
  const lastTsRef = React.useRef(0);
  const drawingRef = React.useRef(false);

  // Resize observer
  React.useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    const ro = new ResizeObserver(() => {
      const r = el.getBoundingClientRect();
      setDims({ w: Math.floor(r.width), h: Math.floor(r.height) });
    });
    ro.observe(el);
    const r = el.getBoundingClientRect();
    setDims({ w: Math.floor(r.width), h: Math.floor(r.height) });
    return () => ro.disconnect();
  }, []);

  // Expose canvas + seek control to parent
  React.useEffect(() => {
    if (canvasRefOut) canvasRefOut.current = canvasRef.current;
    if (seekRef) seekRef.current = (newT) => {
      tRef.current = newT;
      tracePtsRef.current = [];
    };
  });

  // Clear trace when coeffs change
  React.useEffect(() => {
    tracePtsRef.current = [];
    tRef.current = 0;
  }, [coeffs]);

  // Reset zoom
  const resetView = () => {
    viewRef.current = { scale: 1, ox: 0, oy: 0 };
    setViewState({ scale: 1, ox: 0, oy: 0 });
  };

  const zoomBy = (factor, cx, cy) => {
    const v = viewRef.current;
    const w = dims.w, h = dims.h;
    const pcx = cx ?? w / 2;
    const pcy = cy ?? h / 2;
    const newScale = Math.min(20, Math.max(0.1, v.scale * factor));
    // Keep world point under cursor fixed:
    // world_pt = (pcx - w/2 - ox) / scale
    // After zoom: pcx = world_pt * newScale + w/2 + newOx
    // => newOx = pcx - w/2 - (pcx - w/2 - ox) * (newScale/scale)
    const newOx = pcx - w / 2 - (pcx - w / 2 - v.ox) * (newScale / v.scale);
    const newOy = pcy - h / 2 - (pcy - h / 2 - v.oy) * (newScale / v.scale);
    const next = { scale: newScale, ox: newOx, oy: newOy };
    viewRef.current = next;
    setViewState({ ...next });
  };

  // Wheel zoom
  React.useEffect(() => {
    const el = canvasRef.current;
    if (!el) return;
    const onWheel = (e) => {
      e.preventDefault();
      const rect = el.getBoundingClientRect();
      const cx = e.clientX - rect.left;
      const cy = e.clientY - rect.top;
      const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
      zoomBy(factor, cx, cy);
    };
    el.addEventListener('wheel', onWheel, { passive: false });
    return () => el.removeEventListener('wheel', onWheel);
  }, [dims]);

  // activePointers: tracks all current pointer positions for pinch-to-zoom
  const activePointersRef = React.useRef(new Map());
  const lastPinchRef = React.useRef(null);

  // Overlay: grid + user path (redraws on view change)
  React.useEffect(() => {
    const c = overlayRef.current;
    if (!c) return;
    const dpr = window.devicePixelRatio || 1;
    c.width = dims.w * dpr; c.height = dims.h * dpr;
    c.style.width = dims.w + 'px'; c.style.height = dims.h + 'px';
    const ctx = c.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, dims.w, dims.h);

    const { scale, ox, oy } = viewRef.current;
    // World origin in canvas coords:
    const cx = dims.w / 2 + ox;
    const cy = dims.h / 2 + oy;

    // Grid (adapt step to zoom level)
    const baseStep = 40;
    const step = baseStep * scale;
    ctx.strokeStyle = theme.grid;
    ctx.lineWidth = 1;
    ctx.beginPath();
    const startX = (((-cx) / step) | 0) * step + cx % step;
    const startY = (((-cy) / step) | 0) * step + cy % step;
    for (let x = startX; x <= dims.w + step; x += step) {
      ctx.moveTo(x + 0.5, 0); ctx.lineTo(x + 0.5, dims.h);
    }
    for (let y = startY; y <= dims.h + step; y += step) {
      ctx.moveTo(0, y + 0.5); ctx.lineTo(dims.w, y + 0.5);
    }
    ctx.stroke();

    // Axis lines
    ctx.strokeStyle = theme.gridStrong;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx + 0.5, 0); ctx.lineTo(cx + 0.5, dims.h);
    ctx.moveTo(0, cy + 0.5); ctx.lineTo(dims.w, cy + 0.5);
    ctx.stroke();

    // Origin label
    ctx.fillStyle = theme.muted;
    ctx.font = '10px "JetBrains Mono", monospace';
    ctx.fillText('0', cx + 4, cy - 4);

    // User path (pressure-sensitive when stylus data is available)
    if (showUserPath && userPath && userPath.length > 1) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(scale, scale);
      ctx.strokeStyle = theme.user;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      const hasPressure = userPath.some((p) => p.pressure !== undefined && p.pressure !== 1);
      if (hasPressure) {
        ctx.setLineDash([]);
        for (let i = 1; i < userPath.length; i++) {
          const pw = Math.max(0.5, (userPath[i].pressure || 1) * 3);
          ctx.lineWidth = pw / scale;
          ctx.beginPath();
          ctx.moveTo(userPath[i - 1].x, userPath[i - 1].y);
          ctx.lineTo(userPath[i].x, userPath[i].y);
          ctx.stroke();
        }
      } else {
        ctx.lineWidth = 1.2 / scale;
        ctx.setLineDash([3 / scale, 4 / scale]);
        ctx.beginPath();
        ctx.moveTo(userPath[0].x, userPath[0].y);
        for (let i = 1; i < userPath.length; i++) ctx.lineTo(userPath[i].x, userPath[i].y);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      ctx.restore();
    }
  }, [dims, theme, userPath, showUserPath, viewState]);

  // Animation loop
  React.useEffect(() => {
    const c = canvasRef.current;
    if (!c) return;
    const dpr = window.devicePixelRatio || 1;
    c.width = dims.w * dpr; c.height = dims.h * dpr;
    c.style.width = dims.w + 'px'; c.style.height = dims.h + 'px';
    const ctx = c.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    if (!coeffs || coeffs.length === 0) {
      ctx.clearRect(0, 0, dims.w, dims.h);
      return;
    }

    const tick = (ts) => {
      if (!lastTsRef.current) lastTsRef.current = ts;
      const dt = Math.min((ts - lastTsRef.current) / 1000, 0.05);
      lastTsRef.current = ts;

      if (playing) tRef.current = (tRef.current + dt * speed) % 1;
      const t = tRef.current;
      onTimeUpdate && onTimeUpdate(t);

      const tips = evalFourier(coeffs, t, N, phaseOffset || 0);
      const tip = tips[tips.length - 1];

      if (playing) tracePtsRef.current.push({ x: tip.x, y: tip.y, age: 0 });
      const maxAge = trailMode === 'infinite' ? Infinity : trailMode === 'long' ? 3.0 : 1.2;
      for (const p of tracePtsRef.current) p.age += dt;
      if (maxAge !== Infinity) tracePtsRef.current = tracePtsRef.current.filter((p) => p.age < maxAge);

      if (isRecording) {
        ctx.fillStyle = theme.bg;
        ctx.fillRect(0, 0, dims.w, dims.h);
      } else {
        ctx.clearRect(0, 0, dims.w, dims.h);
      }

      const { scale, ox, oy } = viewRef.current;
      const originX = dims.w / 2 + ox;
      const originY = dims.h / 2 + oy;

      ctx.save();
      ctx.translate(originX, originY);
      ctx.scale(scale, scale);

      // Trace
      const trace = tracePtsRef.current;
      const tColor = traceColor || theme.trace;
      const tWidth = traceWidth || 2.2;
      if (trace.length > 1) {
        ctx.lineWidth = tWidth / scale;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        if (maxAge === Infinity) {
          ctx.strokeStyle = tColor;
          ctx.beginPath();
          ctx.moveTo(trace[0].x, trace[0].y);
          for (let i = 1; i < trace.length; i++) ctx.lineTo(trace[i].x, trace[i].y);
          ctx.stroke();
        } else {
          for (let i = 1; i < trace.length; i++) {
            const a = 1 - trace[i].age / maxAge;
            if (a <= 0) continue;
            ctx.strokeStyle = hexWithAlpha(tColor, a);
            ctx.beginPath();
            ctx.moveTo(trace[i - 1].x, trace[i - 1].y);
            ctx.lineTo(trace[i].x, trace[i].y);
            ctx.stroke();
          }
        }
      }

      // Circles + vectors
      if (showCircles || showVectors) {
        for (let i = 0; i < tips.length - 1; i++) {
          const from = tips[i], to = tips[i + 1];
          const r = Math.hypot(to.x - from.x, to.y - from.y);
          if (showCircles && r > 0.5) {
            ctx.strokeStyle = theme.circle;
            ctx.globalAlpha = Math.max(0.15, 1 - i / Math.max(6, N) * 0.8);
            ctx.lineWidth = 1 / scale;
            ctx.beginPath();
            ctx.arc(from.x, from.y, r, 0, Math.PI * 2);
            ctx.stroke();
          }
          if (showVectors) {
            ctx.globalAlpha = 0.9;
            ctx.strokeStyle = theme.vector;
            ctx.lineWidth = 1.2 / scale;
            ctx.beginPath();
            ctx.moveTo(from.x, from.y); ctx.lineTo(to.x, to.y);
            ctx.stroke();
          }
        }
        ctx.globalAlpha = 1;
      }

      // Tip dot
      ctx.fillStyle = tColor;
      ctx.beginPath();
      ctx.arc(tip.x, tip.y, 4 / scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = theme.panel;
      ctx.lineWidth = 1.5 / scale;
      ctx.stroke();

      ctx.restore();
      rafRef.current = requestAnimationFrame(tick);
    };

    rafRef.current = requestAnimationFrame(tick);
    return () => { cancelAnimationFrame(rafRef.current); lastTsRef.current = 0; };
  }, [dims, theme, coeffs, N, speed, playing, showCircles, showVectors, trailMode, traceColor, traceWidth, phaseOffset, isRecording]);

  // Unified pointer events: mouse, touch, stylus — with pressure support and pinch-to-zoom
  const canvasToWorld = (cx, cy, pressure = 1) => {
    const { scale, ox, oy } = viewRef.current;
    return {
      x: (cx - dims.w / 2 - ox) / scale,
      y: (cy - dims.h / 2 - oy) / scale,
      pressure,
    };
  };

  const getPinchState = () => {
    const pts = [...activePointersRef.current.values()];
    if (pts.length < 2) return null;
    const [a, b] = pts;
    return { dist: Math.hypot(a.x - b.x, a.y - b.y), midX: (a.x + b.x) / 2, midY: (a.y + b.y) / 2 };
  };

  const handlePointerDown = (e) => {
    e.preventDefault();
    e.currentTarget.setPointerCapture(e.pointerId);
    const rect = canvasRef.current.getBoundingClientRect();
    const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
    activePointersRef.current.set(e.pointerId, { x: cx, y: cy });

    if (activePointersRef.current.size === 2) {
      panRef.current = null;
      if (drawingRef.current) { drawingRef.current = false; onDrawEnd(); }
      lastPinchRef.current = getPinchState();
      return;
    }

    const isPan = e.button === 1 || e.button === 2 || !canDraw;
    if (isPan) {
      panRef.current = { startX: cx, startY: cy, startOx: viewRef.current.ox, startOy: viewRef.current.oy };
    } else {
      drawingRef.current = true;
      onDrawStart(canvasToWorld(cx, cy, e.pressure || 1));
    }
  };

  const handlePointerMove = (e) => {
    e.preventDefault();
    const rect = canvasRef.current.getBoundingClientRect();
    const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
    activePointersRef.current.set(e.pointerId, { x: cx, y: cy });

    if (activePointersRef.current.size >= 2) {
      const pinch = getPinchState();
      if (lastPinchRef.current) {
        zoomBy(pinch.dist / lastPinchRef.current.dist, pinch.midX, pinch.midY);
        const dx = pinch.midX - lastPinchRef.current.midX, dy = pinch.midY - lastPinchRef.current.midY;
        const v = viewRef.current;
        const next = { ...v, ox: v.ox + dx, oy: v.oy + dy };
        viewRef.current = next; setViewState({ ...next });
      }
      lastPinchRef.current = pinch;
      return;
    }

    if (panRef.current) {
      const dx = cx - panRef.current.startX, dy = cy - panRef.current.startY;
      const next = { ...viewRef.current, ox: panRef.current.startOx + dx, oy: panRef.current.startOy + dy };
      viewRef.current = next; setViewState({ ...next });
    } else if (drawingRef.current) {
      onDrawPoint(canvasToWorld(cx, cy, e.pressure || 1));
    }
  };

  const handlePointerUp = (e) => {
    e.preventDefault();
    activePointersRef.current.delete(e.pointerId);
    if (activePointersRef.current.size < 2) lastPinchRef.current = null;
    if (activePointersRef.current.size === 0) {
      if (panRef.current) { panRef.current = null; return; }
      if (drawingRef.current) { drawingRef.current = false; onDrawEnd(); }
    }
  };

  const cursor = panRef.current ? 'grabbing' : (!canDraw ? 'grab' : 'crosshair');

  return (
    <div ref={containerRef} style={{ position: 'relative', width: '100%', height: '100%' }}>
      <canvas ref={overlayRef} style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }} />
      <canvas
        ref={canvasRef}
        onPointerDown={handlePointerDown}
        onPointerMove={handlePointerMove}
        onPointerUp={handlePointerUp}
        onPointerLeave={handlePointerUp}
        onPointerCancel={handlePointerUp}
        onContextMenu={(e) => e.preventDefault()}
        style={{ position: 'absolute', inset: 0, cursor, touchAction: 'none' }}
      />
      {/* Zoom controls */}
      <div style={{
        position: 'absolute', bottom: 18, right: 20, zIndex: 3,
        display: 'flex', flexDirection: 'column', gap: 4,
      }}>
        {[
          { label: '+', action: () => zoomBy(1.25) },
          { label: '⊙', action: resetView, title: 'Reset view' },
          { label: '−', action: () => zoomBy(1 / 1.25) },
        ].map(({ label, action, title }) => (
          <button key={label} onClick={action} title={title}
            style={{
              width: 32, height: 32, borderRadius: 8,
              background: theme.panel, border: `1px solid ${theme.line}`,
              color: theme.ink, fontSize: label === '⊙' ? 14 : 18,
              fontFamily: 'JetBrains Mono, monospace',
              cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
              boxShadow: '0 2px 8px rgba(0,0,0,0.08)',
            }}
          >{label}</button>
        ))}
        <div style={{
          fontSize: 9, color: theme.muted, textAlign: 'center', letterSpacing: 0.5,
          fontFamily: 'JetBrains Mono, monospace',
        }}>{Math.round(viewState.scale * 100)}%</div>
      </div>
    </div>
  );
}

function hexWithAlpha(hex, a) {
  if (hex.startsWith('rgba') || hex.startsWith('rgb')) {
    return hex.replace(/rgba?\(([^)]+)\)/, (m, inner) => {
      const parts = inner.split(',').map((s) => s.trim());
      return `rgba(${parts[0]},${parts[1]},${parts[2]},${a.toFixed(3)})`;
    });
  }
  const n = parseInt(hex.slice(1), 16);
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return `rgba(${r},${g},${b},${a.toFixed(3)})`;
}

Object.assign(window, { FourierCanvas });

</script>
<script type="text/babel">
// Main App: layout, state, tweaks bridge.

const { useState, useEffect, useRef, useMemo, useCallback } = React;

// URL state encode/decode (feature 7)
function encodeURLState({ preset, coeffs, N, speed, phaseOffset, traceColor, traceWidth, themeKey, mode, vectors }) {
  const o = { v: 1 };
  if (preset) {
    o.p = preset;
  } else if (coeffs && coeffs.length) {
    o.c = coeffs.slice(0, 60).map((c) => [c.freq, +c.amp.toFixed(2), +c.phase.toFixed(4)]);
  }
  if (N !== 60) o.n = N;
  if (Math.abs(speed - 0.25) > 0.001) o.s = +speed.toFixed(3);
  if (phaseOffset) o.po = +phaseOffset.toFixed(4);
  if (traceColor) o.tc = traceColor;
  if (Math.abs(traceWidth - 2.2) > 0.1) o.tw = traceWidth;
  if (themeKey !== 'paper') o.th = themeKey;
  if (mode === 'studio') {
    o.m = 's';
    if (vectors) o.vec = vectors.map((v) => [v.freq, +v.amp.toFixed(2), +v.phase.toFixed(4)]);
  }
  return btoa(JSON.stringify(o));
}

function decodeURLState(hash) {
  try {
    return JSON.parse(atob(hash.replace(/^#s=/, '')));
  } catch { return null; }
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "paper",
  "defaultN": 60,
  "defaultSpeed": 0.25,
  "showCircles": true,
  "showVectors": true,
  "showUserPath": true,
  "trailMode": "infinite",
  "showMath": true
}/*EDITMODE-END*/;

function App() {
  // persisted-tweak controlled values
  const [themeKey, setThemeKey] = useState(TWEAK_DEFAULTS.theme);
  const theme = THEMES[themeKey] || THEMES.paper;

  // language
  const [lang, setLang] = useState(() => localStorage.getItem('fc_lang') || 'en');
  const tr = I18N[lang] || I18N.en;
  const changeLang = (l) => { setLang(l); localStorage.setItem('fc_lang', l); };

  // mode: 'draw' or 'studio'
  const [mode, setMode] = useState('draw');
  const [vectors, setVectors] = useState(() => genDefaultVectors());
  const studioCoeffs = useMemo(() => vectorsToCoeffs(vectors), [vectors]);

  // live controls
  const [N, setN] = useState(TWEAK_DEFAULTS.defaultN);
  const [speed, setSpeed] = useState(TWEAK_DEFAULTS.defaultSpeed);
  const [playing, setPlaying] = useState(true);
  const [showCircles, setShowCircles] = useState(TWEAK_DEFAULTS.showCircles);
  const [showVectors, setShowVectors] = useState(TWEAK_DEFAULTS.showVectors);
  const [showUserPath, setShowUserPath] = useState(TWEAK_DEFAULTS.showUserPath);
  const [trailMode, setTrailMode] = useState(TWEAK_DEFAULTS.trailMode);
  const [showMath, setShowMath] = useState(TWEAK_DEFAULTS.showMath);

  // path / coefficient state
  const [userPath, setUserPath] = useState(null);   // centered points
  const [rawDrawing, setRawDrawing] = useState([]); // during-drag points
  const [isDrawing, setIsDrawing] = useState(false);
  const [coeffs, setCoeffs] = useState(null);
  const [pathResampled, setPathResampled] = useState(null);
  const [activePreset, setActivePreset] = useState('heart');
  const [t, setT] = useState(0);
  const [editMode, setEditMode] = useState(false);

  // undo/redo
  const historyRef = useRef([]);
  const histIdxRef = useRef(-1);

  // stroke customization
  const [traceColor, setTraceColor] = useState(null); // null = theme default
  const [traceWidth, setTraceWidth] = useState(2.2);

  // phase offset
  const [phaseOffset, setPhaseOffset] = useState(0);

  // recording
  const [recording, setRecording] = useState(false);
  const recordCanvasRef = useRef(null);

  // share URL
  const [copied, setCopied] = useState(false);

  // scrubber
  const seekRef = useRef(null);
  const wasPlayingRef = useRef(false);

  // When a preset is chosen, compute coefficients.
  const applyPath = useCallback((points, presetKey = null) => {
    if (!points || points.length < 4) return;
    const closed = closePath(points);
    const { centered } = centerPath(closed);
    const resampled = resamplePath(centered, 512);
    const c = dft(resampled);
    setUserPath(centered);
    setPathResampled(resampled);
    setCoeffs(c);
    setPlaying(true);
    const h = historyRef.current.slice(0, histIdxRef.current + 1);
    h.push({ userPath: centered, coeffs: c, preset: presetKey });
    if (h.length > 50) h.shift();
    historyRef.current = h;
    histIdxRef.current = h.length - 1;
  }, []);

  const restoreFromURLState = useCallback((decoded) => {
    if (!decoded) return false;
    if (decoded.p && PRESETS[decoded.p]) {
      setActivePreset(decoded.p);
      applyPath(PRESETS[decoded.p].fn(), decoded.p);
    } else if (decoded.c) {
      const rc = decoded.c.map(([freq, amp, phase]) => ({ freq, amp, phase, re: amp * Math.cos(phase), im: amp * Math.sin(phase) }));
      setCoeffs(rc);
      setPlaying(true);
      const h = historyRef.current.slice(0, histIdxRef.current + 1);
      h.push({ userPath: null, coeffs: rc, preset: null });
      historyRef.current = h; histIdxRef.current = h.length - 1;
    }
    if (decoded.n !== undefined) setN(decoded.n);
    if (decoded.s !== undefined) setSpeed(decoded.s);
    if (decoded.po) setPhaseOffset(decoded.po);
    if (decoded.tc) setTraceColor(decoded.tc);
    if (decoded.tw !== undefined) setTraceWidth(decoded.tw);
    if (decoded.th) setThemeKey(decoded.th);
    if (decoded.m === 's') {
      setMode('studio');
      if (decoded.vec) setVectors(decoded.vec.map((v, i) => ({ id: i + 1, freq: v[0], amp: v[1], phase: v[2] })));
    }
    return true;
  }, [applyPath]);

  // Load default preset on mount (or restore from URL hash)
  useEffect(() => {
    const hash = window.location.hash;
    if (hash.startsWith('#s=')) {
      const decoded = decodeURLState(hash);
      if (decoded && restoreFromURLState(decoded)) return;
    }
    applyPath(PRESETS.heart.fn(), 'heart');
    // eslint-disable-next-line
  }, []);

  const selectPreset = (key) => {
    setActivePreset(key);
    if (PRESETS[key]) applyPath(PRESETS[key].fn(), key);
  };

  // Drawing handlers
  const onDrawStart = (pt) => {
    setIsDrawing(true);
    setRawDrawing([pt]);
    setCoeffs(null);
    setUserPath(null);
  };
  const onDrawPoint = (pt) => {
    setRawDrawing((prev) => {
      if (prev.length === 0) return [pt];
      const last = prev[prev.length - 1];
      if (Math.hypot(pt.x - last.x, pt.y - last.y) < 2) return prev;
      return [...prev, pt];
    });
  };
  const onDrawEnd = () => {
    setIsDrawing(false);
    setActivePreset(null);
    if (rawDrawing.length >= 6) {
      applyPath(rawDrawing);
    }
    setRawDrawing([]);
  };

  // Clear
  const onClear = () => {
    setCoeffs(null);
    setUserPath(null);
    setRawDrawing([]);
    setActivePreset(null);
  };

  const undo = useCallback(() => {
    if (histIdxRef.current <= 0) return;
    histIdxRef.current--;
    const snap = historyRef.current[histIdxRef.current];
    if (!snap) return;
    setUserPath(snap.userPath);
    setCoeffs(snap.coeffs);
    setActivePreset(snap.preset);
  }, []);

  const redo = useCallback(() => {
    if (histIdxRef.current >= historyRef.current.length - 1) return;
    histIdxRef.current++;
    const snap = historyRef.current[histIdxRef.current];
    if (!snap) return;
    setUserPath(snap.userPath);
    setCoeffs(snap.coeffs);
    setActivePreset(snap.preset);
  }, []);

  const copyShareURL = useCallback(() => {
    const aC = mode === 'studio' ? studioCoeffs : coeffs;
    const encoded = encodeURLState({ preset: activePreset, coeffs: aC, N, speed, phaseOffset, traceColor, traceWidth, themeKey, mode, vectors });
    const url = window.location.href.split('#')[0] + '#s=' + encoded;
    window.history.replaceState(null, '', '#s=' + encoded);
    navigator.clipboard.writeText(url).catch(() => {});
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  }, [mode, studioCoeffs, coeffs, activePreset, N, speed, phaseOffset, traceColor, traceWidth, themeKey, vectors]);

  const startRecording = useCallback(() => {
    const canvas = recordCanvasRef.current;
    if (!canvas || recording) return;
    const mimeType = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm'].find((m) => MediaRecorder.isTypeSupported(m)) || '';
    if (!mimeType) { alert('Recording not supported in this browser.'); return; }
    const stream = canvas.captureStream(30);
    const recorder = new MediaRecorder(stream, { mimeType });
    const chunks = [];
    recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: 'video/webm' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'fourier-canvas.webm'; a.click();
      URL.revokeObjectURL(url);
      setRecording(false);
    };
    recorder.start(100);
    setRecording(true);
    const duration = Math.max(1500, (1 / speed) * 1000 + 300);
    setTimeout(() => { if (recorder.state === 'recording') recorder.stop(); }, duration);
  }, [recording, speed]);

  const scrubberSeek = useCallback((newT) => {
    seekRef.current?.(newT);
    setT(newT);
  }, []);

  const exportSVG = useCallback(() => {
    const aC = mode === 'studio' ? studioCoeffs : coeffs;
    const aN = mode === 'studio' ? studioCoeffs.length : N;
    if (!aC || !aC.length) return;
    const steps = 2000;
    const pts = [];
    for (let i = 0; i <= steps; i++) {
      const tips = evalFourier(aC, i / steps, aN, phaseOffset);
      pts.push(tips[tips.length - 1]);
    }
    const xs = pts.map((p) => p.x), ys = pts.map((p) => p.y);
    const margin = 30;
    const minX = Math.min(...xs) - margin, maxX = Math.max(...xs) + margin;
    const minY = Math.min(...ys) - margin, maxY = Math.max(...ys) + margin;
    const W = maxX - minX, H = maxY - minY;
    const color = traceColor || theme.trace;
    const d = 'M ' + pts.map((p) => `${(p.x - minX).toFixed(2)},${(p.y - minY).toFixed(2)}`).join(' L ') + ' Z';
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W.toFixed(1)} ${H.toFixed(1)}" width="${Math.round(W)}" height="${Math.round(H)}">
  <rect width="${W.toFixed(1)}" height="${H.toFixed(1)}" fill="${theme.bg}"/>
  <path d="${d}" stroke="${color}" stroke-width="${traceWidth}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;
    const blob = new Blob([svg], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'fourier-canvas.svg'; a.click();
    URL.revokeObjectURL(url);
  }, [mode, studioCoeffs, coeffs, N, phaseOffset, traceColor, traceWidth, theme]);

  const exportPNG = useCallback(() => {
    const aC = mode === 'studio' ? studioCoeffs : coeffs;
    const aN = mode === 'studio' ? studioCoeffs.length : N;
    if (!aC || !aC.length) return;
    const steps = 2000;
    const pts = [];
    for (let i = 0; i <= steps; i++) {
      const tips = evalFourier(aC, i / steps, aN, phaseOffset);
      pts.push(tips[tips.length - 1]);
    }
    const xs = pts.map((p) => p.x), ys = pts.map((p) => p.y);
    const margin = 40;
    const minX = Math.min(...xs) - margin, maxX = Math.max(...xs) + margin;
    const minY = Math.min(...ys) - margin, maxY = Math.max(...ys) + margin;
    const W = Math.ceil(maxX - minX), H = Math.ceil(maxY - minY);
    const sc = 2;
    const cv = document.createElement('canvas');
    cv.width = W * sc; cv.height = H * sc;
    const ctx = cv.getContext('2d');
    ctx.scale(sc, sc);
    ctx.fillStyle = theme.bg;
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = traceColor || theme.trace;
    ctx.lineWidth = traceWidth;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath();
    pts.forEach((p, i) => {
      if (i === 0) ctx.moveTo(p.x - minX, p.y - minY);
      else ctx.lineTo(p.x - minX, p.y - minY);
    });
    ctx.closePath(); ctx.stroke();
    cv.toBlob((blob) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'fourier-canvas.png'; a.click();
      URL.revokeObjectURL(url);
    });
  }, [mode, studioCoeffs, coeffs, N, phaseOffset, traceColor, traceWidth, theme]);

  // Expose keyboard shortcut targets
  useEffect(() => {
    window.__togglePlay = () => setPlaying((p) => !p);
    window.__undo = undo;
    window.__redo = redo;
    return () => { window.__togglePlay = null; window.__undo = null; window.__redo = null; };
  }, [undo, redo]);

  // Tweaks: postMessage bridge
  useEffect(() => {
    const handler = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setEditMode(true);
      if (e.data.type === '__deactivate_edit_mode') setEditMode(false);
    };

    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const setTweak = (key, value) => {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: value } }, '*');
  };

  // Amplitude summary for the math panel
  const topAmps = useMemo(() => {
    const src = mode === 'studio' ? studioCoeffs : coeffs;
    if (!src) return [];
    return src.slice(0, 8).map((c, i) => ({
      i,
      freq: c.freq,
      amp: c.amp,
      phase: c.phase,
    }));
  }, [coeffs, studioCoeffs, mode]);

  const maxN = Math.min(coeffs ? coeffs.length : 200, 200);

  // In studio mode, the active coeffs come from user vectors; maxN is len.
  const activeCoeffs = mode === 'studio' ? studioCoeffs : coeffs;
  const activeN = mode === 'studio' ? studioCoeffs.length : N;

  // Inline live-drawing render inside canvas (via extra prop)
  const activePath = isDrawing && rawDrawing.length > 1 ? rawDrawing : userPath;

  return (
    <div style={{
      position: 'fixed', inset: 0,
      background: theme.bg,
      color: theme.ink,
      fontFamily: 'Inter, -apple-system, sans-serif',
      display: 'grid',
      gridTemplateColumns: 'minmax(260px, 300px) 1fr',
      overflow: 'hidden',
    }}>
      {/* Left rail */}
      <aside style={{
        borderRight: `1px solid ${theme.line}`,
        background: theme.panel,
        display: 'flex', flexDirection: 'column',
        overflow: 'hidden',
        minWidth: 0,
      }}>
        {/* Sticky header: wordmark + mode toggle — always visible */}
        <div style={{
          padding: '16px 20px 14px',
          flexShrink: 0,
          borderBottom: `1px solid ${theme.line}`,
          background: theme.panel,
        }}>
          <div style={{
            fontFamily: 'JetBrains Mono, monospace',
            fontSize: 9, letterSpacing: 3, color: theme.muted,
            textTransform: 'uppercase', marginBottom: 4,
          }}>Fourier Canvas</div>
          <div style={{
            fontFamily: 'Newsreader, ui-serif, Georgia, serif',
            fontSize: 20, lineHeight: 1.2,
            fontWeight: 400, letterSpacing: -0.4, marginBottom: 14,
          }}>
            <em style={{ fontStyle: 'italic' }}>f</em>(t) = <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 16 }}>Σ cₙ e<sup style={{ fontSize: 9 }}>i2πnt</sup></span>
          </div>
          {/* Mode toggle */}
          <div style={{
            display: 'grid', gridTemplateColumns: '1fr 1fr',
            border: `1px solid ${theme.line}`, borderRadius: 8, overflow: 'hidden',
          }}>
            {[['draw', tr.draw], ['studio', tr.studio]].map(([k, label]) => (
              <button key={k} onClick={() => setMode(k)}
                style={{
                  padding: '9px 8px', fontSize: 12, fontFamily: 'Inter, sans-serif',
                  fontWeight: 600, letterSpacing: 0.4, cursor: 'pointer',
                  background: mode === k ? theme.ink : 'transparent',
                  color: mode === k ? theme.panel : theme.muted,
                  border: 'none', transition: 'all 120ms',
                }}>{label}</button>
            ))}
          </div>
        </div>

        {/* Scrollable content */}
        <div style={{
          overflowY: 'auto', flex: 1,
          padding: '18px 20px 24px',
          display: 'flex', flexDirection: 'column', gap: 20,
        }}>
        {/* Description */}
        <div style={{ fontSize: 12, color: theme.muted, lineHeight: 1.5 }}>
          {mode === 'draw' ? tr.tagline : tr.taglineStudio}
        </div>

        {mode === 'studio' && (
          <VectorStudio vectors={vectors} setVectors={setVectors} theme={theme} tr={tr} />
        )}

        {mode === 'studio' && (
          <section style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <SectionLabel theme={theme}>{tr.playback}</SectionLabel>
            <Slider label={tr.speed} value={speed} min={0.02} max={1.5} step={0.01}
              theme={theme} onChange={setSpeed} format={(v) => `${v.toFixed(2)}×`} />
            <Slider
              label={tr.phaseOffset}
              value={phaseOffset}
              min={0}
              max={6.2832}
              step={0.01}
              onChange={setPhaseOffset}
              theme={theme}
              format={(v) => `${(v / Math.PI).toFixed(2)}π`}
            />
            <div style={{ display: 'flex', gap: 8 }}>
              <Button theme={theme} primary onClick={() => setPlaying((p) => !p)}>
                {playing ? tr.pause : tr.play}
              </Button>
            </div>
          </section>
        )}

        {/* Presets */}
        {mode === 'draw' && (
        <>
        <section>
          <SectionLabel theme={theme}>{tr.presets}</SectionLabel>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
            {Object.entries(PRESETS).map(([key, p]) => (
              <PresetChip
                key={key}
                label={p.label}
                active={activePreset === key}
                theme={theme}
                onClick={() => selectPreset(key)}
              />
            ))}
          </div>
        </section>

        {/* Controls */}
        <section style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <SectionLabel theme={theme}>{tr.controls}</SectionLabel>
          <Slider
            label={tr.epicycles}
            value={N}
            min={1}
            max={maxN}
            step={1}
            onChange={setN}
            theme={theme}
            format={(v) => `${v}`}
          />
          <Slider
            label={tr.speed}
            value={speed}
            min={0.02}
            max={1.5}
            step={0.01}
            onChange={setSpeed}
            theme={theme}
            format={(v) => `${v.toFixed(2)}×`}
          />
          <Slider
            label={tr.phaseOffset}
            value={phaseOffset}
            min={0}
            max={6.2832}
            step={0.01}
            onChange={setPhaseOffset}
            theme={theme}
            format={(v) => `${(v / Math.PI).toFixed(2)}π`}
          />
          <div style={{ display: 'flex', gap: 8 }}>
            <Button theme={theme} primary onClick={() => setPlaying((p) => !p)}>
              {playing ? tr.pause : tr.play}
            </Button>
            <Button theme={theme} onClick={onClear}>{tr.clear}</Button>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <Button theme={theme} small onClick={undo}>{tr.undo}</Button>
            <Button theme={theme} small onClick={redo}>{tr.redo}</Button>
          </div>
        </section>
        </>
        )}

        {/* Layers */}
        <section style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          <SectionLabel theme={theme}>{tr.layers}</SectionLabel>
          <Toggle label={tr.epicyclesToggle} value={showCircles} onChange={setShowCircles} theme={theme} />
          <Toggle label={tr.vectors}         value={showVectors} onChange={setShowVectors} theme={theme} />
          <Toggle label={tr.sourcePath}      value={showUserPath} onChange={setShowUserPath} theme={theme} />
        </section>

        {/* Stroke */}
        <section style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          <SectionLabel theme={theme}>{tr.stroke}</SectionLabel>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <span style={{ fontSize: 11, color: theme.muted, fontFamily: 'Inter, sans-serif', flex: 1 }}>
              {tr.traceColor}
            </span>
            <input
              type="color"
              value={traceColor || theme.trace}
              onChange={(e) => setTraceColor(e.target.value)}
              style={{ width: 36, height: 28, border: `1px solid ${theme.line}`, borderRadius: 4, cursor: 'pointer', padding: 2, background: 'transparent' }}
            />
            <button
              onClick={() => setTraceColor(null)}
              title="Reset to theme default"
              style={{ fontSize: 11, color: theme.muted, background: 'transparent', border: `1px solid ${theme.line}`, borderRadius: 4, padding: '4px 7px', cursor: 'pointer', fontFamily: 'Inter, sans-serif' }}
            >↺</button>
          </div>
          <Slider
            label={tr.traceWidth}
            value={traceWidth}
            min={0.5}
            max={8}
            step={0.5}
            onChange={setTraceWidth}
            theme={theme}
            format={(v) => `${v}px`}
          />
        </section>

        {/* Trail */}
        <section>
          <SectionLabel theme={theme}>{tr.trail}</SectionLabel>
          <div style={{ display: 'flex', gap: 6 }}>
            {[['short', tr.short], ['long', tr.long], ['infinite', tr.infinite]].map(([m, label]) => (
              <button
                key={m}
                onClick={() => setTrailMode(m)}
                style={{
                  flex: 1, padding: '7px 0',
                  background: trailMode === m ? theme.ink : 'transparent',
                  color: trailMode === m ? theme.panel : theme.ink,
                  border: `1px solid ${theme.line}`,
                  borderRadius: 6,
                  fontSize: 11,
                  fontFamily: 'Inter, sans-serif',
                  fontWeight: 500,
                  cursor: 'pointer',
                }}
              >{label}</button>
            ))}
          </div>
        </section>

        {/* Export */}
        {(activeCoeffs && activeCoeffs.length > 0) && (
        <section>
          <SectionLabel theme={theme}>{tr.export}</SectionLabel>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            <Button theme={theme} onClick={exportSVG}>{tr.exportSVG} ↓</Button>
            <Button theme={theme} onClick={exportPNG}>{tr.exportPNG} ↓</Button>
            <Button theme={theme} onClick={startRecording}>{recording ? tr.recording : tr.record}</Button>
            <Button theme={theme} primary onClick={copyShareURL}>{copied ? tr.copied : tr.share}</Button>
          </div>
        </section>
        )}

        {/* Hint for mobile/desktop */}
        {mode === 'draw' && (
        <section style={{
          fontSize: 11, lineHeight: 1.6, color: theme.muted,
          fontFamily: 'JetBrains Mono, monospace',
          padding: '12px 14px',
          border: `1px dashed ${theme.line}`,
          borderRadius: 6,
        }}>
          <div>{tr.hintDraw}</div>
          <div style={{ marginTop: 6 }}><span style={{ color: theme.ink }}>{tr.hintSpace}</span> {tr.hintSpaceLabel}</div>
          <div><span style={{ color: theme.ink }}>{tr.hintC}</span> {tr.hintCLabel}</div>
        </section>
        )}
        </div>{/* end scrollable content */}
      </aside>

      {/* Main canvas area */}
      <main style={{ position: 'relative', overflow: 'hidden' }}>
        {/* Top status bar */}
        <div style={{
          position: 'absolute', top: 0, left: 0, right: 0, zIndex: 2,
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          padding: '14px 20px',
          pointerEvents: 'none',
        }}>
          <div style={{
            fontFamily: 'JetBrains Mono, monospace', fontSize: 11, letterSpacing: 1.5,
            textTransform: 'uppercase', color: theme.muted,
          }}>
            {mode === 'studio'
              ? tr.vectorCount(vectors.length)
              : (coeffs ? `${N} / ${coeffs.length} ${tr.harmonics}` : tr.ready)}
            <span style={{ margin: '0 10px', color: theme.line }}>│</span>
            t = {t.toFixed(3)}
          </div>
          <div style={{
            display: 'flex', gap: 4, pointerEvents: 'auto',
            background: theme.panel, border: `1px solid ${theme.line}`, borderRadius: 99,
            padding: 3,
          }}>
            {Object.keys(I18N).map((l) => (
              <button
                key={l}
                onClick={() => changeLang(l)}
                title={I18N[l].langName}
                style={{
                  padding: '3px 8px', borderRadius: 99,
                  border: lang === l ? `1.5px solid ${theme.ink}` : '1px solid transparent',
                  background: lang === l ? theme.ink : 'transparent',
                  color: lang === l ? theme.panel : theme.muted,
                  fontSize: 10, fontFamily: 'JetBrains Mono, monospace',
                  fontWeight: 600, letterSpacing: 0.5, cursor: 'pointer',
                }}
              >{I18N[l].langLabel}</button>
            ))}
          </div>
          <div style={{
            display: 'flex', gap: 6, pointerEvents: 'auto',
            background: theme.panel, border: `1px solid ${theme.line}`, borderRadius: 99,
            padding: 3,
          }}>
            {Object.entries(THEMES).map(([k, v]) => (
              <button
                key={k}
                onClick={() => { setThemeKey(k); setTweak('theme', k); }}
                style={{
                  width: 28, height: 28, borderRadius: 99,
                  border: themeKey === k ? `2px solid ${theme.ink}` : `1px solid ${theme.line}`,
                  background: v.bg,
                  cursor: 'pointer',
                  position: 'relative',
                }}
                title={v.name}
              >
                <span style={{
                  position: 'absolute', inset: 4, borderRadius: 99,
                  background: v.accent,
                }} />
              </button>
            ))}
          </div>
        </div>

        {/* Canvas */}
        <FourierCanvas
          theme={theme}
          coeffs={activeCoeffs}
          userPath={mode === 'studio' ? null : activePath}
          pathResampled={pathResampled}
          N={activeN}
          speed={speed}
          playing={playing && !isDrawing}
          showCircles={showCircles}
          showVectors={showVectors}
          showUserPath={showUserPath && mode !== 'studio'}
          trailMode={trailMode}
          canDraw={mode === 'draw'}
          onDrawStart={onDrawStart}
          onDrawPoint={onDrawPoint}
          onDrawEnd={onDrawEnd}
          onTimeUpdate={(nt) => setT(nt)}
          traceColor={traceColor}
          traceWidth={traceWidth}
          phaseOffset={phaseOffset}
          seekRef={seekRef}
          canvasRefOut={recordCanvasRef}
          isRecording={recording}
        />

        {/* Math readout */}
        {showMath && activeCoeffs && activeCoeffs.length > 0 && (
          <div style={{
            position: 'absolute', bottom: 18, left: 20, zIndex: 2,
            background: `${theme.panel}`,
            border: `1px solid ${theme.line}`,
            borderRadius: 8,
            padding: '14px 16px',
            minWidth: 260,
            fontFamily: 'JetBrains Mono, monospace',
            fontSize: 11,
            color: theme.ink,
            boxShadow: themeKey === 'graphite' ? '0 4px 20px rgba(0,0,0,0.4)' : '0 4px 20px rgba(0,0,0,0.08)',
          }}>
            <div style={{
              fontSize: 9, letterSpacing: 2, textTransform: 'uppercase',
              color: theme.muted, marginBottom: 10,
              display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            }}>
              <span>{tr.dominantHarmonics}</span>
              <button onClick={() => setShowMath(false)} style={{
                background: 'none', border: 'none', color: theme.muted, cursor: 'pointer',
                fontSize: 12, padding: 0, lineHeight: 1,
              }}>×</button>
            </div>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 10.5 }}>
              <thead>
                <tr style={{ color: theme.muted }}>
                  <th style={{ textAlign: 'left', padding: '2px 0', fontWeight: 400 }}>#</th>
                  <th style={{ textAlign: 'right', padding: '2px 0', fontWeight: 400 }}>freq</th>
                  <th style={{ textAlign: 'right', padding: '2px 0', fontWeight: 400 }}>|c|</th>
                  <th style={{ textAlign: 'right', padding: '2px 0', fontWeight: 400 }}>arg</th>
                </tr>
              </thead>
              <tbody>
                {topAmps.map((r) => {
                  const barW = Math.min(1, r.amp / (topAmps[0]?.amp || 1));
                  return (
                    <tr key={r.i}>
                      <td style={{ padding: '3px 0' }}>{String(r.i).padStart(2, '0')}</td>
                      <td style={{ textAlign: 'right', padding: '3px 6px' }}>{r.freq > 0 ? `+${r.freq}` : r.freq}</td>
                      <td style={{ textAlign: 'right', padding: '3px 0', position: 'relative' }}>
                        <div style={{
                          position: 'absolute', right: 0, top: 4,
                          height: 10,
                          width: barW * 70,
                          background: theme.accent,
                          opacity: 0.2,
                          borderRadius: 1,
                        }} />
                        <span style={{ position: 'relative' }}>{r.amp.toFixed(1)}</span>
                      </td>
                      <td style={{ textAlign: 'right', padding: '3px 0' }}>{r.phase.toFixed(2)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}

        {!showMath && activeCoeffs && activeCoeffs.length > 0 && (
          <button
            onClick={() => setShowMath(true)}
            style={{
              position: 'absolute', bottom: 18, left: 20, zIndex: 2,
              background: theme.panel, border: `1px solid ${theme.line}`, borderRadius: 99,
              padding: '6px 12px', fontSize: 10, letterSpacing: 1.5, textTransform: 'uppercase',
              color: theme.muted, cursor: 'pointer', fontFamily: 'JetBrains Mono, monospace',
            }}
          >{tr.showMath}</button>
        )}

        {/* Recording indicator */}
        {recording && (
          <div style={{
            position: 'absolute', top: 60, right: 20, zIndex: 5,
            background: theme.panel, border: `1px solid ${theme.line}`, borderRadius: 8,
            padding: '6px 12px', display: 'flex', alignItems: 'center', gap: 8,
            fontFamily: 'JetBrains Mono, monospace', fontSize: 11, color: theme.ink,
            boxShadow: '0 2px 12px rgba(0,0,0,0.15)',
          }}>
            <span style={{ width: 8, height: 8, borderRadius: 99, background: '#e53e3e', display: 'inline-block' }} />
            {tr.recording}
          </div>
        )}

        {/* Playback scrubber */}
        {activeCoeffs && activeCoeffs.length > 0 && (
          <div style={{
            position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 2,
            padding: '4px 16px 8px',
            background: `linear-gradient(to top, ${theme.panel}cc 0%, transparent 100%)`,
            display: 'flex', alignItems: 'center', gap: 10,
          }}>
            <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 9, color: theme.muted, minWidth: 28, textAlign: 'right' }}>
              {Math.round(t * 100)}%
            </span>
            <input
              type="range"
              min={0}
              max={999}
              step={1}
              value={Math.round(t * 999)}
              onChange={(e) => scrubberSeek(parseInt(e.target.value) / 999)}
              onPointerDown={() => { wasPlayingRef.current = playing; setPlaying(false); }}
              onPointerUp={() => { if (wasPlayingRef.current) setPlaying(true); }}
              style={{ flex: 1, accentColor: theme.accent, height: 3, cursor: 'pointer' }}
            />
            <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 9, color: theme.muted, minWidth: 28 }}>
              100%
            </span>
          </div>
        )}

        {/* Empty state hint */}
        {!coeffs && !isDrawing && (
          <div style={{
            position: 'absolute', inset: 0, display: 'flex',
            alignItems: 'center', justifyContent: 'center',
            pointerEvents: 'none',
          }}>
            <div style={{
              color: theme.muted, textAlign: 'center',
              fontFamily: 'Newsreader, Georgia, serif',
              fontSize: 20, fontStyle: 'italic', letterSpacing: -0.2,
            }}>
              {tr.drawHint}
              <div style={{
                fontSize: 11, fontStyle: 'normal', letterSpacing: 2, marginTop: 10,
                fontFamily: 'JetBrains Mono, monospace', textTransform: 'uppercase',
              }}>{tr.drawHintSub}</div>
            </div>
          </div>
        )}

        {/* Edit-mode badge (Tweaks) */}
        {editMode && (
          <div style={{
            position: 'absolute', bottom: 18, right: 20, zIndex: 3,
            background: theme.panel, border: `1px solid ${theme.line}`, borderRadius: 10,
            padding: 16, minWidth: 240,
            boxShadow: '0 8px 30px rgba(0,0,0,0.12)',
          }}>
            <div style={{ fontSize: 10, letterSpacing: 2, textTransform: 'uppercase',
              color: theme.muted, marginBottom: 12, fontFamily: 'JetBrains Mono, monospace',
            }}>{tr.tweaks}</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              <div>
                <div style={{ fontSize: 11, color: theme.muted, marginBottom: 6 }}>{tr.theme}</div>
                <div style={{ display: 'flex', gap: 6 }}>
                  {Object.entries(THEMES).map(([k, v]) => (
                    <button key={k} onClick={() => { setThemeKey(k); setTweak('theme', k); }}
                      style={{
                        flex: 1, padding: '6px 8px', fontSize: 11,
                        background: themeKey === k ? theme.ink : 'transparent',
                        color: themeKey === k ? theme.panel : theme.ink,
                        border: `1px solid ${theme.line}`, borderRadius: 6, cursor: 'pointer',
                      }}>{v.name}</button>
                  ))}
                </div>
              </div>
              <Toggle label={tr.showMathPanel} value={showMath} onChange={(v) => { setShowMath(v); setTweak('showMath', v); }} theme={theme} />
              <Slider label={tr.defaultN} value={N} min={1} max={maxN} step={1} theme={theme}
                onChange={(v) => { setN(v); setTweak('defaultN', v); }}
                format={(v) => `${v}`} />
              <Slider label={tr.defaultSpeed} value={speed} min={0.02} max={1.5} step={0.01} theme={theme}
                onChange={(v) => { setSpeed(v); setTweak('defaultSpeed', v); }}
                format={(v) => `${v.toFixed(2)}×`} />
            </div>
          </div>
        )}
      </main>
    </div>
  );
}

function SectionLabel({ children, theme }) {
  return (
    <div style={{
      fontFamily: 'JetBrains Mono, monospace',
      fontSize: 10, letterSpacing: 2.5, textTransform: 'uppercase',
      color: theme.muted, marginBottom: 10,
    }}>{children}</div>
  );
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') {
    e.preventDefault();
    window.__togglePlay && window.__togglePlay();
  }
  if ((e.ctrlKey || e.metaKey) && e.code === 'KeyZ' && !e.shiftKey) {
    e.preventDefault();
    window.__undo && window.__undo();
  }
  if ((e.ctrlKey || e.metaKey) && (e.code === 'KeyY' || (e.code === 'KeyZ' && e.shiftKey))) {
    e.preventDefault();
    window.__redo && window.__redo();
  }
});

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
